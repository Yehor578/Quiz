<!DOCTYPE html>
<html lang="uk">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sixseven" class="sixseven">
    😎😎😎
</div>
<div class="app-container">
    <div id="start-screen" class="screen">
        <h1>Вітаємо у квізі!</h1>
        <button id="start-btn">Почати</button>
    </div>

<!-- Екран квізу -->
<div id="quiz-screen" class="screen hide">
    <div class="header">
        <span id="timer">Час: 15</span>
        <span id="score-display">Бали: 0</span>
    </div>
    <h2 id="question-text">Тут буде питання</h2>
    <div id="answers-container">
       
    </div>
</div>

<!-- Екран результату -->
<div id="result-screen" class="hide">
    <h2>Квіз завершено!</h2>
    <p id="result-text"></p>
    <button id="restart-btn">Спробувати ще</button>
</div>

</div>
<script src="script.js"></script>
</body>
</html>
